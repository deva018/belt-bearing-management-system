services:
  - type: web
    name: rd-bearing-mill-store
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SQLITE_DB_PATH
        value: /var/data/database.sqlite
    disk:
      name: db-disk
      mountPath: /var/data
      sizeGB: 1
